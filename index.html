<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sienna</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(#050018,#0b0033,#14003d);
font-family:'Poppins',sans-serif;
overflow:hidden;
color:white;
text-align:center;
}

/* TITLES */

h1{
font-family:'Great Vibes',cursive;
font-size:70px;
margin:0;
letter-spacing:2px;
text-shadow:
0 0 10px #fff,
0 0 20px #ff80bf,
0 0 40px #ff4da6;
}

#instruction{
margin-top:10px;
font-size:18px;
opacity:.85;
}

/* SKY */

#sky{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.star{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
0%{opacity:.2}
100%{opacity:1}
}

/* CONSTELLATION */

.constellation{
position:absolute;
top:15%;
width:100%;
display:flex;
justify-content:center;
gap:40px;
}

.letter{
display:grid;
grid-template-columns:repeat(3,10px);
grid-template-rows:repeat(5,10px);
gap:8px;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white;
animation:twinkle 2s infinite alternate;
}

/* CAKE */

#cake{
margin-top:40px;
position:relative;
display:flex;
flex-direction:column;
align-items:center;
}

.layer{
height:70px;
border-radius:25px;
margin-top:-15px;
opacity:0;
transform:translateY(80px);
animation:cakeBuild 1s forwards;
box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.bottom{
width:260px;
background:linear-gradient(#ff8ac6,#ff5ca8);
animation-delay:0s;
}

.middle{
width:220px;
background:linear-gradient(#ffd6ef,#ffc0e1);
animation-delay:1s;
}

.top{
width:180px;
background:linear-gradient(#ffb3d9,#ff8ac6);
animation-delay:2s;
}

@keyframes cakeBuild{
to{
opacity:1;
transform:translateY(0);
}
}

/* CANDLES */

#candles{
position:absolute;
top:-35px;
display:flex;
gap:18px;
}

.candle{
width:12px;
height:40px;
border-radius:4px;
background:repeating-linear-gradient(
45deg,
white,
white 4px,
#ff4fa3 4px,
#ff4fa3 8px
);
position:relative;
cursor:pointer;
}

.flame{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
width:12px;
height:18px;
border-radius:50%;
background:radial-gradient(circle,#fff,#ffd000,#ff7b00);
animation:flicker .15s infinite alternate;
}

@keyframes flicker{
from{transform:translateX(-50%) scale(1)}
to{transform:translateX(-50%) scale(1.2)}
}

/* SMOKE */

.smoke{
position:absolute;
top:-20px;
left:50%;
width:10px;
height:10px;
background:gray;
border-radius:50%;
opacity:.5;
animation:smoke 1s forwards;
}

@keyframes smoke{
0%{transform:translateY(0);opacity:.7}
100%{transform:translateY(-25px);opacity:0}
}

/* BALLOONS */

#balloons{
position:absolute;
bottom:-140px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
}

.balloon{
width:60px;
height:80px;
border-radius:50%;
cursor:pointer;
position:relative;
animation:float 6s infinite ease-in-out;
}

.balloon:nth-child(1){background:#ff6fa8}
.balloon:nth-child(2){background:#ffd166}
.balloon:nth-child(3){background:#6ecbff}
.balloon:nth-child(4){background:#9cff9c}
.balloon:nth-child(5){background:#d39cff}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:120px;
background:#999;
top:80px;
left:50%;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-30px)}
100%{transform:translateY(0)}
}

</style>
</head>

<body>

<div id="sky"></div>

<h1>Happy Birthday</h1>
<h1>Sienna</h1>
<div id="instruction">Pop the balloons 🎈</div>

<div class="constellation" id="constellation"></div>

<div id="cake">

<div id="candles"></div>

<div class="layer top"></div>
<div class="layer middle"></div>
<div class="layer bottom"></div>

</div>

<div id="balloons">
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
</div>

<script>

/* SKY STARS */

const sky=document.getElementById("sky")

for(let i=0;i<120;i++){
let star=document.createElement("div")
star.className="star"
star.style.top=Math.random()*100+"%"
star.style.left=Math.random()*100+"%"
star.style.animationDelay=Math.random()*3+"s"
sky.appendChild(star)
}

/* CANDLES */

const candles=document.getElementById("candles")
let candlesOut=0

for(let i=0;i<5;i++){

let c=document.createElement("div")
c.className="candle"

let f=document.createElement("div")
f.className="flame"

c.appendChild(f)

c.onclick=()=>{

if(f.parentNode){

let smoke=document.createElement("div")
smoke.className="smoke"

c.appendChild(smoke)

f.remove()

candlesOut++

if(candlesOut===5){
instruction.innerText="🎉 Happy Birthday Sienna!"
}

}

}

candles.appendChild(c)

}

/* BALLOONS */

let balloons=document.querySelectorAll(".balloon")
let popped=0

balloons.forEach(b=>{

b.onclick=()=>{

b.style.display="none"
popped++

if(popped===5){
instruction.innerText="Blow out the candles 🕯"
}

}

})

/* CONSTELLATION SINNA */

const letters={
S:[[0,0],[1,0],[2,0],[2,1],[1,2],[0,3],[1,4],[2,4]],
I:[[1,0],[1,1],[1,2],[1,3],[1,4]],
N:[[0,4],[0,3],[0,2],[1,1],[2,0],[2,1],[2,2],[2,3],[2,4]],
A:[[1,0],[0,1],[2,1],[0,2],[1,2],[2,2],[0,3],[2,3],[0,4],[2,4]]
}

const name="SINNA"
const container=document.getElementById("constellation")

name.split("").forEach(l=>{

let grid=document.createElement("div")
grid.className="letter"

for(let r=0;r<5;r++){

for(let c=0;c<3;c++){

let dot=document.createElement("div")

if(letters[l].some(p=>p[0]==c&&p[1]==r)){
dot.className="dot"
}

grid.appendChild(dot)

}

}

container.appendChild(grid)

})

</script>

</body>
</html>
