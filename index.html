<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
transition:1s;
}

/* instructions */

#instruction{
position:absolute;
top:40px;
font-size:32px;
font-family:'Pacifico',cursive;
color:white;
text-shadow:0 0 15px pink;
display:none;
}

/* terminal */

#terminal{
width:650px;
height:240px;
background:#020617;
padding:20px;
border-radius:10px;
color:#00ff9c;
font-family:monospace;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
overflow:auto;
}

/* button */

#startBtn{
margin-top:30px;
padding:15px 35px;
font-size:22px;
border:none;
border-radius:12px;
background:#ff4fa3;
color:white;
cursor:pointer;
display:none;
}

/* balloons */

#balloons{
display:none;
position:absolute;
top:50%;
left:0;
width:100%;
transform:translateY(-50%);
height:300px;
}

.balloon{
width:100px;
height:120px;
border-radius:50%;
position:absolute;
cursor:pointer;
animation:float 4s ease-in-out infinite;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:120px;
background:#555;
top:120px;
left:50%;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0)}
}

.b1{background:#ff6b6b;left:10%}
.b2{background:#ffd93d;left:30%}
.b3{background:#6bc5ff;left:50%}
.b4{background:#b36bff;left:70%}
.b5{background:#ff9ecf;left:85%}

/* scroll */

#scroll{
display:none;
position:absolute;
background:#fff8dc;
padding:30px;
border-radius:10px;
width:420px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
border:4px solid #d2b48c;
font-family:Georgia;
}

#scroll button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#ff4fa3;
color:white;
border-radius:8px;
cursor:pointer;
}

/* cake */

#cakeArea{
display:none;
flex-direction:column;
align-items:center;
}

#cake{
font-size:120px;
}

.candle{
font-size:35px;
cursor:pointer;
margin:5px;
}

/* final */

#final{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
}

/* sienna */

#sienna{
font-size:28px;
line-height:28px;
margin-bottom:20px;
}

/* happy */

#happy{
font-size:110px;
font-family:'Pacifico',cursive;
background:linear-gradient(45deg,#ff7eb9,#ffb347,#7efff5,#ff6b6b);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px white;
animation:fade 4s forwards;
}

@keyframes fade{
0%{opacity:0;transform:scale(.6)}
100%{opacity:1;transform:scale(1)}
}

/* letter */

#letterBtn{
margin-top:30px;
padding:14px 28px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff7eb9;
color:white;
cursor:pointer;
display:none;
}

#letter{
display:none;
background:#fff8dc;
padding:35px;
border-radius:12px;
width:420px;
text-align:center;
font-family:'Great Vibes',cursive;
font-size:28px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
}

/* popup decor */

.popup{
position:absolute;
font-size:40px;
animation:pop 0.8s ease;
}

@keyframes pop{
0%{transform:scale(0)}
80%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* confetti */

.confetti{
position:absolute;
width:12px;
height:12px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<div id="instruction"></div>

<div id="terminal"></div>
<button id="startBtn">Click on me</button>

<div id="balloons">
<div class="balloon b1" onclick="openScroll(0)"></div>
<div class="balloon b2" onclick="openScroll(1)"></div>
<div class="balloon b3" onclick="openScroll(2)"></div>
<div class="balloon b4" onclick="openScroll(3)"></div>
<div class="balloon b5" onclick="openScroll(4)"></div>
</div>

<div id="scroll">
<p id="scrollText"></p>
<button onclick="closeScroll()">Continue</button>
</div>

<div id="cakeArea">

<div id="cake">🎂</div>

<div>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
</div>

</div>

<div id="final">

<div id="sienna"></div>

<div id="happy">Happy Birthday</div>

<button id="letterBtn" onclick="openLetter()">Open your final surprise 💌</button>

<div id="letter">

<p>
Today is a special day ✨<br><br>
You are amazing and deserve happiness.<br>
May all your dreams come true.<br><br>
Happy Birthday Sienna 💖
</p>

</div>

</div>

<script>

const terminal=document.getElementById("terminal")
const startBtn=document.getElementById("startBtn")
const balloons=document.getElementById("balloons")
const scroll=document.getElementById("scroll")
const scrollText=document.getElementById("scrollText")
const cakeArea=document.getElementById("cakeArea")
const final=document.getElementById("final")
const letterBtn=document.getElementById("letterBtn")
const letter=document.getElementById("letter")
const sienna=document.getElementById("sienna")
const instruction=document.getElementById("instruction")

const text=`Preparing something special...

Loading happiness ✨
Loading memories 💖

Everything ready...`

let i=0

function type(){
if(i<text.length){
terminal.innerHTML+=text.charAt(i)
i++
setTimeout(type,35)
}else startBtn.style.display="block"
}

type()

startBtn.onclick=()=>{

document.body.style.background="linear-gradient(135deg,#ffd6ec,#ffe8cc,#e0f7ff)"

terminal.style.display="none"
startBtn.style.display="none"

balloons.style.display="block"

instruction.innerText="Click the balloons 🎈"
instruction.style.display="block"

}

/* balloons */

const messages=[
"You are amazing 💖",
"Never stop smiling 😊",
"Dream big and shine ✨",
"You deserve happiness 🌸",
"Make a wish 🎂"
]

let popped=0
let currentBalloon

function openScroll(i){
currentBalloon=i
scrollText.innerText=messages[i]
scroll.style.display="block"
}

function closeScroll(){

scroll.style.display="none"

document.querySelectorAll(".balloon")[currentBalloon].innerHTML="💥"

popped++

if(popped===5){

instruction.innerText="Blow out the candles 🕯"

setTimeout(()=>{
balloons.style.display="none"
cakeArea.style.display="flex"
},600)

}

}

/* candles */

let candles=5

function blow(c){

if(c.innerHTML==="💨") return

c.innerHTML="💨"
candles--

if(candles===0){
showFinal()
}

}

/* final */

function showFinal(){

instruction.style.display="none"

cakeArea.style.display="none"
final.style.display="flex"

letterBtn.style.display="block"

createConfetti()
createPopups()
createSienna()

}

/* confetti */

function createConfetti(){

for(let i=0;i<200;i++){

let conf=document.createElement("div")
conf.className="confetti"

conf.style.left=Math.random()*100+"%"
conf.style.background=`hsl(${Math.random()*360},100%,60%)`
conf.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(conf)

}

}

/* popup icons */

function createPopups(){

const icons=["💖","💜","💙","💛","🧡","❤️","💚","🩷","🌸","🌺","🎶","🎵","🐶","✨"]

for(let i=0;i<50;i++){

let p=document.createElement("div")

p.className="popup"
p.innerHTML=icons[Math.floor(Math.random()*icons.length)]

p.style.left=Math.random()*100+"%"
p.style.top=Math.random()*100+"%"

setTimeout(()=>{
document.body.appendChild(p)
},i*120)

}

}

/* SIENNA hearts */

function createSienna(){

const pattern=[
"11100010001011110111010001",
"10010010001010000100011001",
"11100010001011100111010101",
"10010010001010000100010011",
"10010010001010000100010001",
"11100001110011110111010001"
]

const hearts=["💖","💜","💙","💛","🧡","❤️","💚","🩷"]

pattern.forEach(row=>{
let line=document.createElement("div")

for(let c of row){

if(c==="1"){
line.innerHTML+=hearts[Math.floor(Math.random()*hearts.length)]
}else{
line.innerHTML+="&nbsp;"
}

}

sienna.appendChild(line)

})

}

/* letter */

function openLetter(){

letterBtn.style.display="none"
letter.style.display="block"

}

</script>

</body>
</html>
