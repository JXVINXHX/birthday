<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
transition:1s;
}

#instruction{
position:absolute;
top:40px;
font-size:32px;
font-family:'Pacifico',cursive;
color:white;
text-shadow:0 0 15px pink;
display:none;
}

#terminal{
width:650px;
height:240px;
background:#020617;
padding:20px;
border-radius:10px;
color:#00ff9c;
font-family:monospace;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
overflow:auto;
}

#startBtn{
margin-top:30px;
padding:15px 35px;
font-size:22px;
border:none;
border-radius:12px;
background:#ff4fa3;
color:white;
cursor:pointer;
display:none;
}

/* balloons */

#balloons{
display:none;
position:absolute;
top:50%;
left:0;
width:100%;
transform:translateY(-50%);
height:300px;
}

.balloon{
width:100px;
height:120px;
border-radius:50%;
position:absolute;
cursor:pointer;
animation:float 4s ease-in-out infinite;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:120px;
background:#555;
top:120px;
left:50%;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0)}
}

.b1{background:#ff6b6b;left:10%}
.b2{background:#ffd93d;left:30%}
.b3{background:#6bc5ff;left:50%}
.b4{background:#b36bff;left:70%}
.b5{background:#ff9ecf;left:85%}

/* scroll */

#scroll{
display:none;
position:absolute;
background:#fff8dc;
padding:30px;
border-radius:10px;
width:420px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
border:4px solid #d2b48c;
font-family:Georgia;
}

#scroll button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#ff4fa3;
color:white;
border-radius:8px;
cursor:pointer;
}

/* cake */

#cakeArea{
display:none;
flex-direction:column;
align-items:center;
}

#cake{
font-size:120px;
}

.candle{
font-size:35px;
cursor:pointer;
margin:5px;
}

/* final */

#final{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
}

/* happy birthday */

#happy{
font-size:110px;
font-family:'Pacifico',cursive;
background:linear-gradient(45deg,#ff7eb9,#ffb347,#7efff5,#ff6b6b);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px white;
animation:fade 4s forwards;
}

@keyframes fade{
0%{opacity:0;transform:scale(.6)}
100%{opacity:1;transform:scale(1)}
}

/* letter */

#letterBtn{
margin-top:30px;
padding:14px 28px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff7eb9;
color:white;
cursor:pointer;
display:none;
}

#letter{
display:none;
background:#fff8dc;
padding:35px;
border-radius:12px;
width:420px;
text-align:center;
font-family:'Great Vibes',cursive;
font-size:28px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
}

/* sienna lettering */

#sienna{
margin-top:40px;
display:none;
}

#sienna svg{
width:600px;
}

.letter{
fill:none;
stroke:#ff4fa3;
stroke-width:6;
stroke-linecap:round;
stroke-linejoin:round;
stroke-dasharray:400;
stroke-dashoffset:400;
animation:draw 3s forwards;
}

.letter:nth-child(1){animation-delay:0.5s;}
.letter:nth-child(2){animation-delay:1s;}
.letter:nth-child(3){animation-delay:1.5s;}
.letter:nth-child(4){animation-delay:2s;}
.letter:nth-child(5){animation-delay:2.5s;}
.letter:nth-child(6){animation-delay:3s;}

@keyframes draw{
to{stroke-dashoffset:0;}
}

/* confetti */

.confetti{
position:absolute;
width:12px;
height:12px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div id="instruction"></div>

<div id="terminal"></div>
<button id="startBtn">Click on me</button>

<div id="balloons">
<div class="balloon b1" onclick="openScroll(0)"></div>
<div class="balloon b2" onclick="openScroll(1)"></div>
<div class="balloon b3" onclick="openScroll(2)"></div>
<div class="balloon b4" onclick="openScroll(3)"></div>
<div class="balloon b5" onclick="openScroll(4)"></div>
</div>

<div id="scroll">
<p id="scrollText"></p>
<button onclick="closeScroll()">Continue</button>
</div>

<div id="cakeArea">

<div id="cake">🎂</div>

<div>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
</div>

</div>

<div id="final">

<div id="happy">Happy Birthday</div>

<button id="letterBtn" onclick="openLetter()">Open your final surprise 💌</button>

<div id="letter">

<p>
Today is a special day ✨<br><br>
You are amazing and deserve happiness.<br>
May all your dreams come true.<br><br>
Happy Birthday Sienna 💖
</p>

</div>

<div id="sienna">

<svg viewBox="0 0 600 120">

<path d="M30 80 C10 40 120 40 90 80 C60 120 160 120 130 80" class="letter"/>
<path d="M170 110 L170 30" class="letter"/>
<path d="M220 110 L220 30 L270 110 L270 30" class="letter"/>
<path d="M310 110 L310 30 L360 110 L360 30" class="letter"/>
<path d="M400 30 L400 110 L450 110" class="letter"/>
<path d="M480 110 L480 30 L530 110 L530 30" class="letter"/>

</svg>

</div>

</div>

<script>

const terminal=document.getElementById("terminal")
const startBtn=document.getElementById("startBtn")
const balloons=document.getElementById("balloons")
const scroll=document.getElementById("scroll")
const scrollText=document.getElementById("scrollText")
const cakeArea=document.getElementById("cakeArea")
const final=document.getElementById("final")
const letterBtn=document.getElementById("letterBtn")
const letter=document.getElementById("letter")
const sienna=document.getElementById("sienna")
const instruction=document.getElementById("instruction")

const text=`Preparing something special...

Loading happiness ✨
Loading memories 💖

Everything ready...`

let i=0

function type(){
if(i<text.length){
terminal.innerHTML+=text.charAt(i)
i++
setTimeout(type,35)
}else startBtn.style.display="block"
}

type()

startBtn.onclick=()=>{

document.body.style.background="linear-gradient(135deg,#ffd6ec,#ffe8cc,#e0f7ff)"

terminal.style.display="none"
startBtn.style.display="none"

balloons.style.display="block"

instruction.innerText="Click the balloons 🎈"
instruction.style.display="block"

}

const messages=[
"You are amazing 💖",
"Never stop smiling 😊",
"Dream big and shine ✨",
"You deserve happiness 🌸",
"Make a wish 🎂"
]

let popped=0
let currentBalloon

function openScroll(i){
currentBalloon=i
scrollText.innerText=messages[i]
scroll.style.display="block"
}

function closeScroll(){

scroll.style.display="none"

document.querySelectorAll(".balloon")[currentBalloon].innerHTML="💥"

popped++

if(popped===5){

instruction.innerText="Blow out the candles 🕯"

setTimeout(()=>{
balloons.style.display="none"
cakeArea.style.display="flex"
},600)

}

}

let candles=5

function blow(c){

if(c.innerHTML==="💨") return

c.innerHTML="💨"
candles--

if(candles===0){
showFinal()
}

}

function showFinal(){

instruction.style.display="none"

cakeArea.style.display="none"
final.style.display="flex"

letterBtn.style.display="block"

startConfetti()

}

function startConfetti(){

setInterval(()=>{

let conf=document.createElement("div")
conf.className="confetti"

conf.style.left=Math.random()*100+"%"
conf.style.background=`hsl(${Math.random()*360},100%,60%)`
conf.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(conf)

setTimeout(()=>{
conf.remove()
},6000)

},120)

}

function openLetter(){

letterBtn.style.display="none"
letter.style.display="block"

setTimeout(()=>{
sienna.style.display="block"
},1500)

}

</script>

</body>
</html>
