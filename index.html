```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
height:100vh;
background:#000;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
}

/* SKY */

#sky{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at bottom,#001,#000 70%);
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.3}
to{opacity:1}
}

/* TERMINAL */

#terminal{
width:600px;
height:200px;
background:#020617;
padding:20px;
border-radius:10px;
color:#00ff9c;
font-family:monospace;
box-shadow:0 20px 40px rgba(0,0,0,.7);
overflow:auto;
}

#startBtn{
margin-top:30px;
padding:15px 35px;
font-size:22px;
border:none;
border-radius:12px;
background:#ff4fa3;
color:white;
cursor:pointer;
display:none;
}

/* BALLOONS */

#balloons{
display:none;
position:absolute;
top:50%;
width:100%;
transform:translateY(-50%);
}

.balloon{
width:90px;
height:110px;
border-radius:50%;
position:absolute;
cursor:pointer;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.b1{background:#ff6b6b;left:10%}
.b2{background:#ffd93d;left:30%}
.b3{background:#6bc5ff;left:50%}
.b4{background:#b36bff;left:70%}
.b5{background:#ff9ecf;left:85%}

/* SCROLL */

#scroll{
display:none;
position:absolute;
background:#fff8dc;
padding:30px;
border-radius:10px;
width:420px;
text-align:center;
color:black;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
border:4px solid #d2b48c;
font-family:Georgia;
}

#scroll button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#ff4fa3;
color:white;
border-radius:8px;
cursor:pointer;
}

/* CAKE BUILD */

#cakeArea{
display:none;
flex-direction:column;
align-items:center;
margin-top:50px;
}

.layer{
width:200px;
height:50px;
border-radius:20px;
margin-top:5px;
opacity:0;
}

#base{background:#d2691e;}
#cream{background:#fff0f5;}
#top{background:#ffb6c1;}

.drop{
animation:drop 1s forwards;
}

@keyframes drop{
0%{transform:translateY(-300px);opacity:0}
100%{transform:translateY(0);opacity:1}
}

/* CANDLES */

#candles{
margin-top:10px;
display:flex;
}

.candle{
width:10px;
height:35px;
background:white;
margin:5px;
position:relative;
opacity:0;
}

.flame{
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
width:10px;
height:15px;
background:radial-gradient(circle,#fff 10%,#ffd000 40%,#ff6b00 70%);
border-radius:50%;
animation:flicker .15s infinite alternate;
}

@keyframes flicker{
0%{transform:translateX(-50%) scale(1)}
100%{transform:translateX(-50%) scale(1.25)}
}

/* TEXT */

#blowText{
margin-top:20px;
font-family:'Pacifico';
font-size:40px;
display:none;
}

/* FINAL */

#final{
display:none;
text-align:center;
}

#happy{
font-size:90px;
font-family:'Pacifico';
}

#letterBtn{
margin-top:20px;
padding:14px 28px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff7eb9;
color:white;
cursor:pointer;
}

#letter{
display:none;
background:#fff8dc;
padding:35px;
border-radius:12px;
width:420px;
font-family:'Great Vibes';
font-size:30px;
color:black;
margin-top:20px;
}

/* CONFETTI */

.confetti{
position:absolute;
width:10px;
height:10px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* SIENNA STARS */

.starName{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0;
animation:appear 1s forwards;
}

@keyframes appear{
to{opacity:1}
}

</style>
</head>

<body>

<div id="sky"></div>

<div id="terminal"></div>
<button id="startBtn">Click on me</button>

<div id="balloons">
<div class="balloon b1" onclick="popBalloon(this,0)"></div>
<div class="balloon b2" onclick="popBalloon(this,1)"></div>
<div class="balloon b3" onclick="popBalloon(this,2)"></div>
<div class="balloon b4" onclick="popBalloon(this,3)"></div>
<div class="balloon b5" onclick="popBalloon(this,4)"></div>
</div>

<div id="scroll">
<p id="scrollText"></p>
<button onclick="closeScroll()">Continue</button>
</div>

<div id="cakeArea">

<div id="base" class="layer"></div>
<div id="cream" class="layer"></div>
<div id="top" class="layer"></div>

<div id="candles"></div>

<div id="blowText">Blow out the candles 🕯</div>

</div>

<div id="final">

<div id="happy">Happy Birthday</div>

<button id="letterBtn" onclick="openLetter()">Open your final surprise 💌</button>

<div id="letter">
Today is a special day ✨<br><br>
You deserve happiness.<br>
May all your dreams come true.<br><br>
Happy Birthday Sienna 💖
</div>

</div>

<script>

/* SKY STARS */

for(let i=0;i<120;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"
document.getElementById("sky").appendChild(s)
}

/* TERMINAL */

const terminal=document.getElementById("terminal")
const startBtn=document.getElementById("startBtn")

const text=`Preparing something special...

Loading happiness ✨
Loading memories 💖

Everything ready...`

let i=0

function type(){
if(i<text.length){
terminal.innerHTML+=text.charAt(i)
i++
setTimeout(type,35)
}else startBtn.style.display="block"
}

type()

startBtn.onclick=()=>{
terminal.style.display="none"
startBtn.style.display="none"
document.getElementById("balloons").style.display="block"
}

/* BALLOONS */

const messages=[
"You are amazing 💖",
"Never stop smiling 😊",
"Dream big ✨",
"You deserve happiness 🌸",
"Make a wish 🎂"
]

let popped=0

function popBalloon(el,i){
document.getElementById("scrollText").innerText=messages[i]
document.getElementById("scroll").style.display="block"
el.remove()
}

function closeScroll(){
document.getElementById("scroll").style.display="none"
popped++

if(popped===5){
document.getElementById("balloons").style.display="none"
buildCake()
}
}

/* CAKE BUILD */

function buildCake(){

let base=document.getElementById("base")
let cream=document.getElementById("cream")
let top=document.getElementById("top")
let candles=document.getElementById("candles")

document.getElementById("cakeArea").style.display="flex"

setTimeout(()=>base.classList.add("drop"),200)
setTimeout(()=>cream.classList.add("drop"),1200)
setTimeout(()=>top.classList.add("drop"),2200)

setTimeout(()=>{

for(let i=0;i<5;i++){

let c=document.createElement("div")
c.className="candle"
c.onclick=()=>blow(c)

let f=document.createElement("div")
f.className="flame"

c.appendChild(f)

candles.appendChild(c)

setTimeout(()=>{c.style.opacity=1},i*300)

}

},3200)

setTimeout(()=>{
document.getElementById("blowText").style.display="block"
},4200)

}

/* CANDLES */

let candlesLeft=5

function blow(c){

if(c.classList.contains("off"))return

c.classList.add("off")
c.querySelector(".flame").remove()

candlesLeft--

if(candlesLeft===0){
showFinal()
}

}

/* FINAL */

function showFinal(){

document.getElementById("cakeArea").style.display="none"
document.getElementById("final").style.display="block"

startConfetti()
createSiennaStars()

}

/* CONFETTI */

function startConfetti(){

setInterval(()=>{

let conf=document.createElement("div")
conf.className="confetti"

conf.style.left=Math.random()*100+"%"
conf.style.background=`hsl(${Math.random()*360},100%,60%)`
conf.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(conf)

setTimeout(()=>conf.remove(),6000)

},120)

}

/* SIENNA STARS */

function createSiennaStars(){

let points=[
[30,20],[35,25],[40,20],
[45,25],[50,20],[55,25],
[60,20],[65,25],[70,20]
]

points.forEach((p,i)=>{

let star=document.createElement("div")
star.className="starName"

star.style.left=p[0]+"%"
star.style.top=p[1]+"%"

star.style.animationDelay=i*.2+"s"

document.body.appendChild(star)

})

}

/* LETTER */

function openLetter(){
document.getElementById("letterBtn").style.display="none"
document.getElementById("letter").style.display="block"
}

</script>

</body>
</html>
