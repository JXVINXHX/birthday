<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleaños</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    color:white;
}

h1{
    font-size:70px;
    animation:brillo 2s infinite alternate;
}

p{
    font-size:25px;
}

@keyframes brillo{
    from{ text-shadow:0 0 10px white;}
    to{ text-shadow:0 0 30px yellow;}
}

/* Globos */

.balloon{
    position:absolute;
    bottom:-150px;
    width:80px;
    height:100px;
    border-radius:50%;
    animation:subir 10s infinite;
}

.balloon:after{
    content:"";
    position:absolute;
    width:2px;
    height:60px;
    background:white;
    left:50%;
    top:100%;
}

@keyframes subir{
    0%{ transform:translateY(0);}
    100%{ transform:translateY(-120vh);}
}

/* colores globos */

.b1{background:red; left:10%; animation-duration:9s;}
.b2{background:blue; left:25%; animation-duration:11s;}
.b3{background:yellow; left:40%; animation-duration:10s;}
.b4{background:purple; left:60%; animation-duration:12s;}
.b5{background:orange; left:75%; animation-duration:8s;}
.b6{background:lime; left:90%; animation-duration:13s;}

/* pastel */

.cake{
    font-size:80px;
    margin-top:20px;
}

/* confeti */

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    background:white;
    animation:confeti 5s linear infinite;
}

@keyframes confeti{
    0%{ transform:translateY(-10vh) rotate(0deg);}
    100%{ transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Feliz Cumpleaños 🎉</h1>
    <p>Que este día esté lleno de alegría, amor y muchos sueños cumplidos.</p>
    <div class="cake">🎂</div>
</div>

<!-- Globos -->
<div class="balloon b1"></div>
<div class="balloon b2"></div>
<div class="balloon b3"></div>
<div class="balloon b4"></div>
<div class="balloon b5"></div>
<div class="balloon b6"></div>

<!-- Confeti -->
<script>
for(let i=0;i<80;i++){
    let confeti=document.createElement("div");
    confeti.className="confetti";
    confeti.style.left=Math.random()*100+"%";
    confeti.style.animationDuration=(Math.random()*3+3)+"s";
    confeti.style.backgroundColor="hsl("+Math.random()*360+",100%,50%)";
    document.body.appendChild(confeti);
}
</script>

</body>
</html>
