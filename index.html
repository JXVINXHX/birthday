
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sienna</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b1026;
font-family:Poppins;
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
text-align:center;
}

/* STARS */

.star{
position:absolute;
background:white;
width:2px;
height:2px;
border-radius:50%;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2}
50%{opacity:1}
}

/* BALLOONS */

#balloons{
position:absolute;
top:8%;
display:flex;
gap:40px;
}

.balloon{
width:80px;
height:100px;
border-radius:50%;
position:relative;
cursor:pointer;
animation:float 4s ease-in-out infinite;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:80px;
background:white;
left:50%;
top:100%;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

/* TITLE */

#title{
font-family:"Great Vibes";
font-size:80px;
margin-top:20px;
}

/* CAKE */

#cake{
position:relative;
margin-top:30px;
}

.layer{
height:60px;
border-radius:20px;
margin:auto;
opacity:0;
}

#layer1{
width:240px;
background:#ff9ecb;
}

#layer2{
width:190px;
background:#ff7fb8;
margin-top:-20px;
}

#layer3{
width:140px;
background:#ffb3d7;
margin-top:-20px;
}

.frosting{
width:260px;
height:20px;
background:white;
border-radius:20px;
margin:auto;
margin-top:-10px;
opacity:0;
}

/* CANDLES */

.candle{
width:10px;
height:40px;
background:white;
position:absolute;
bottom:120px;
opacity:0;
}

.flame{
width:8px;
height:12px;
background:orange;
border-radius:50%;
position:absolute;
top:-12px;
left:1px;
animation:flicker .3s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

/* LETTER */

#letter{
position:absolute;
bottom:-300px;
width:340px;
background:white;
color:#333;
padding:30px;
border-radius:12px;
line-height:1.6;
font-size:14px;
transition:1s;
}

/* CONSTELLATION */

.constellation{
position:absolute;
font-size:70px;
font-family:"Great Vibes";
top:30%;
opacity:0;
transition:2s;
}

</style>
</head>

<body>

<div id="balloons"></div>

<h1 id="title">Happy Birthday Sienna</h1>

<div id="cake">

<div id="layer1" class="layer"></div>
<div id="layer2" class="layer"></div>
<div id="layer3" class="layer"></div>

<div id="frost" class="frosting"></div>

<div class="candle" style="left:70px"><div class="flame"></div></div>
<div class="candle" style="left:100px"><div class="flame"></div></div>
<div class="candle" style="left:130px"><div class="flame"></div></div>
<div class="candle" style="left:160px"><div class="flame"></div></div>
<div class="candle" style="left:190px"><div class="flame"></div></div>

</div>

<div id="letter">
Dear Sienna,<br><br>
May this day be full of laughter, surprises, and beautiful moments.
You deserve happiness, adventure, and dreams that keep growing brighter every year.<br><br>

Never stop shining the way you do.<br><br>

Happy Birthday ✨
</div>

<div class="constellation" id="constellation">SIENNA</div>

<script>

/* STARS */

for(let i=0;i<140;i++){
let star=document.createElement("div")
star.className="star"
star.style.top=Math.random()*100+"%"
star.style.left=Math.random()*100+"%"
star.style.animationDelay=Math.random()*2+"s"
document.body.appendChild(star)
}

/* BALLOONS */

const colors=["#ff6b6b","#feca57","#1dd1a1","#54a0ff","#ff9ff3"]

for(let i=0;i<5;i++){

let b=document.createElement("div")
b.className="balloon"
b.style.background=colors[i]

b.onclick=()=>{
b.style.transform="scale(1.8)"
b.style.opacity=0
setTimeout(()=>b.remove(),300)
}

document.getElementById("balloons").appendChild(b)

}

/* CAKE BUILD */

setTimeout(()=>{

document.getElementById("layer1").style.opacity=1

},1000)

setTimeout(()=>{

document.getElementById("layer2").style.opacity=1

},2000)

setTimeout(()=>{

document.getElementById("layer3").style.opacity=1

},3000)

setTimeout(()=>{

document.getElementById("frost").style.opacity=1

},4000)

setTimeout(()=>{

document.querySelectorAll(".candle").forEach(c=>c.style.opacity=1)

},5000)

setTimeout(()=>{

document.getElementById("letter").style.bottom="40px"

},7000)

setTimeout(()=>{

document.getElementById("constellation").style.opacity=1

},10000)

</script>

</body>
</html>
