<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
transition:1s;
}

/* instructions */

#instruction{
position:absolute;
top:40px;
font-size:32px;
font-family:'Pacifico',cursive;
color:white;
text-shadow:0 0 15px pink;
display:none;
z-index:20;
}

/* terminal */

#terminal{
width:650px;
height:240px;
background:#020617;
padding:20px;
border-radius:10px;
color:#00ff9c;
font-family:monospace;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
overflow:auto;
}

/* button */

#startBtn{
margin-top:30px;
padding:15px 35px;
font-size:22px;
border:none;
border-radius:12px;
background:#ff4fa3;
color:white;
cursor:pointer;
display:none;
}

/* balloons */

#balloons{
display:none;
position:absolute;
top:50%;
left:0;
width:100%;
transform:translateY(-50%);
height:300px;
z-index:10;
}

.balloon{
width:100px;
height:120px;
border-radius:50%;
position:absolute;
cursor:pointer;
animation:float 4s ease-in-out infinite;
display:flex;
align-items:center;
justify-content:center;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:120px;
background:#555;
top:120px;
left:50%;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0)}
}

.b1{background:#ff6b6b;left:10%}
.b2{background:#ffd93d;left:30%}
.b3{background:#6bc5ff;left:50%}
.b4{background:#b36bff;left:70%}
.b5{background:#ff9ecf;left:85%}

/* scroll */

#scroll{
display:none;
position:absolute;
background:#fff8dc;
padding:30px;
border-radius:10px;
width:420px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
border:4px solid #d2b48c;
font-family:Georgia;
z-index:20;
}

#scroll button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#ff4fa3;
color:white;
border-radius:8px;
cursor:pointer;
}

/* cake */

#cakeArea{
display:none;
flex-direction:column;
align-items:center;
z-index:10;
}

#cake{
font-size:120px;
}

.candle{
font-size:35px;
cursor:pointer;
margin:5px;
}

/* final */

#final{
display:none;
font-size:110px;
font-family:'Pacifico',cursive;
background:linear-gradient(45deg,#ff7eb9,#ffb347,#7efff5,#ff6b6b);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px white;
animation:fadeIn 4s forwards;
}

@keyframes fadeIn{
0%{opacity:0; transform:scale(0.6)}
100%{opacity:1; transform:scale(1)}
}

/* confetti */

.confetti{
position:absolute;
width:12px;
height:12px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0)}
100%{transform:translateY(110vh) rotate(720deg)}
}

/* decorations */

.decor{
position:absolute;
animation:floatDecor linear infinite;
}

@keyframes floatDecor{
0%{transform:translateY(110vh)}
100%{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<div id="instruction"></div>

<div id="terminal"></div>

<button id="startBtn">Click on me</button>

<div id="balloons">
<div class="balloon b1" onclick="openScroll(0)"></div>
<div class="balloon b2" onclick="openScroll(1)"></div>
<div class="balloon b3" onclick="openScroll(2)"></div>
<div class="balloon b4" onclick="openScroll(3)"></div>
<div class="balloon b5" onclick="openScroll(4)"></div>
</div>

<div id="scroll">
<p id="scrollText"></p>
<button onclick="closeScroll()">Continue</button>
</div>

<div id="cakeArea">

<div id="cake">🎂</div>

<div>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
</div>

</div>

<div id="final">Happy Birthday</div>

<script>

const terminal=document.getElementById("terminal");
const startBtn=document.getElementById("startBtn");
const balloons=document.getElementById("balloons");
const scroll=document.getElementById("scroll");
const scrollText=document.getElementById("scrollText");
const cakeArea=document.getElementById("cakeArea");
const final=document.getElementById("final");
const instruction=document.getElementById("instruction");

const text=`Preparing something special...

Loading music 🎵
Loading happiness ✨
Loading memories 💖

Everything is ready...`;

let i=0;

function type(){

if(i<text.length){
terminal.innerHTML+=text.charAt(i);
i++;
setTimeout(type,35);
}else{
startBtn.style.display="block";
}

}

type();

/* start */

startBtn.onclick=()=>{

document.body.style.background="linear-gradient(135deg,#ffd6ec,#ffe8cc,#e0f7ff)";

startBtn.style.display="none";
terminal.style.display="none";

balloons.style.display="block";

instruction.innerText="Click on the balloons 🎈";
instruction.style.display="block";

}

/* messages */

const messages=[
"You are amazing 💖",
"Never stop smiling 😊",
"Dream big and shine ✨",
"You deserve happiness 🌸",
"Make a wish 🎂"
];

let currentBalloon;
let popped=0;

function openScroll(i){

currentBalloon=i;
scrollText.innerText=messages[i];
scroll.style.display="block";

}

function closeScroll(){

scroll.style.display="none";

document.querySelectorAll(".balloon")[currentBalloon].innerHTML="💥";

popped++;

if(popped===5){

instruction.innerText="Blow out the candles (click on them) 🕯";

setTimeout(()=>{

balloons.style.display="none";
cakeArea.style.display="flex";

},600);

}

}

/* candles */

let candles=5;

function blow(c){

if(c.innerHTML==="💨") return;

c.innerHTML="💨";
candles--;

if(candles===0){
showFinal();
}

}

/* final */

function showFinal(){

instruction.style.display="none";

cakeArea.style.display="none";
final.style.display="block";

/* confetti */

for(let i=0;i<250;i++){

let conf=document.createElement("div");
conf.className="confetti";

conf.style.left=Math.random()*100+"%";
conf.style.background=`hsl(${Math.random()*360},100%,60%)`;
conf.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(conf);

}

/* decorations */

const icons=["💖","🌸","🌼","🌺","🎈","🎶","🐶","💐","✨","🎵"];

for(let i=0;i<80;i++){

let d=document.createElement("div");

d.className="decor";
d.innerHTML=icons[Math.floor(Math.random()*icons.length)];

d.style.left=Math.random()*100+"%";
d.style.fontSize=(Math.random()*40+30)+"px";
d.style.animationDuration=(Math.random()*10+10)+"s";

document.body.appendChild(d);

}

}

</script>

</body>
</html>
