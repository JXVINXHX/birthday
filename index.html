<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
transition:1s;
}

/* terminal */

#terminal{
width:650px;
height:240px;
background:#020617;
padding:20px;
border-radius:10px;
color:#00ff9c;
font-family:monospace;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
overflow:auto;
}

/* button */

#startBtn{
margin-top:30px;
padding:15px 35px;
font-size:22px;
border:none;
border-radius:12px;
background:#ff4fa3;
color:white;
cursor:pointer;
display:none;
}

/* balloons */

#balloons{
display:none;
position:absolute;
bottom:-200px;
width:100%;
height:100%;
transition:2s;
}

.balloon{
width:100px;
height:120px;
border-radius:50%;
position:absolute;
animation:float 5s ease-in-out infinite;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* balloon strings */

.balloon::after{
content:"";
position:absolute;
width:2px;
height:120px;
background:#555;
top:110px;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0)}
}

.b1{background:#ff6b6b;left:10%}
.b2{background:#ffd93d;left:30%}
.b3{background:#6bc5ff;left:50%}
.b4{background:#b36bff;left:70%}
.b5{background:#ff9ecf;left:85%}

/* parchment */

#scroll{
display:none;
position:absolute;
background:#fff8dc;
padding:30px;
border-radius:10px;
width:420px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
border:4px solid #d2b48c;
font-family:Georgia;
animation:openScroll 0.6s;
}

@keyframes openScroll{
from{transform:scale(0)}
to{transform:scale(1)}
}

/* cake */

#cakeArea{
display:none;
flex-direction:column;
align-items:center;
}

#cake{
font-size:120px;
}

.candle{
font-size:35px;
cursor:pointer;
margin:5px;
}

/* final message */

#final{
display:none;
font-size:90px;
color:#ff7eb9;
font-family:'Great Vibes',cursive;
text-shadow:0 0 20px white;
opacity:0;
animation:fadeIn 5s forwards;
}

@keyframes fadeIn{
0%{opacity:0; transform:scale(0.8)}
100%{opacity:1; transform:scale(1)}
}

/* confetti */

.confetti{
position:absolute;
width:12px;
height:12px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg)}
100%{transform:translateY(110vh) rotate(720deg)}
}

/* floating decorations */

.decoration{
position:absolute;
font-size:40px;
animation:floatDecor 10s infinite linear;
}

@keyframes floatDecor{
0%{transform:translateY(100vh)}
100%{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<div id="terminal"></div>

<button id="startBtn">Click on me</button>

<div id="balloons">
<div class="balloon b1" onclick="openScroll(0)"></div>
<div class="balloon b2" onclick="openScroll(1)"></div>
<div class="balloon b3" onclick="openScroll(2)"></div>
<div class="balloon b4" onclick="openScroll(3)"></div>
<div class="balloon b5" onclick="openScroll(4)"></div>
</div>

<div id="scroll">
<p id="scrollText"></p>
<button onclick="closeScroll()">Continue</button>
</div>

<div id="cakeArea">

<div id="cake">🎂</div>

<div>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
<span class="candle" onclick="blow(this)">🕯</span>
</div>

</div>

<div id="final">Happy Birthday</div>

<script>

/* intro typing */

const text=`Preparing a small surprise...

Loading happiness...
Loading music...
Loading love...

Everything is ready ✨`;

let i=0;

function type(){

if(i<text.length){
document.getElementById("terminal").innerHTML+=text.charAt(i);
i++;
setTimeout(type,35);
}
else{
document.getElementById("startBtn").style.display="block";
}

}

type();

/* start */

document.getElementById("startBtn").onclick=()=>{

document.body.style.background="linear-gradient(135deg,#ffd6ec,#ffe8cc,#e0f7ff)";

document.getElementById("startBtn").style.display="none";
document.getElementById("terminal").style.display="none";

let balloons=document.getElementById("balloons");
balloons.style.display="block";

setTimeout(()=>{balloons.style.bottom="0px";},50);

}

/* balloon messages */

const messages=[
"You are amazing 💖",
"Never stop smiling 😊",
"Dream big and shine ✨",
"You deserve happiness 🌸",
"Make a wish before the cake 🎂"
];

let currentBalloon;

function openScroll(i){
currentBalloon=i;
document.getElementById("scrollText").innerText=messages[i];
document.getElementById("scroll").style.display="block";
}

function closeScroll(){

document.getElementById("scroll").style.display="none";

let balloons=document.querySelectorAll(".balloon");
balloons[currentBalloon].innerHTML="💥";
balloons[currentBalloon].onclick=null;

if(currentBalloon===4){

setTimeout(()=>{
document.getElementById("balloons").style.display="none";
document.getElementById("cakeArea").style.display="flex";
},700);

}

}

/* candles */

let candles=5;

function blow(c){

if(c.innerHTML==="💨") return;

c.innerHTML="💨";
candles--;

if(candles===0){
showFinal();
}

}

/* final screen */

function showFinal(){

document.getElementById("cakeArea").style.display="none";
document.getElementById("final").style.display="block";

/* confetti */

for(let i=0;i<200;i++){

let conf=document.createElement("div");
conf.className="confetti";

conf.style.left=Math.random()*100+"%";
conf.style.background="hsl("+Math.random()*360+",100%,60%)";
conf.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(conf);

}

/* decorations */

const icons=[
"🐶","🐕","💖","💗","💘",
"🎵","🎶",
"🌸","✨",
"💿 Lana",
"💿 Frank",
"💿 SZA",
"💿 Daniel"
];

for(let i=0;i<60;i++){

let d=document.createElement("div");
d.className="decoration";

d.innerHTML=icons[Math.floor(Math.random()*icons.length)];

d.style.left=Math.random()*100+"%";
d.style.animationDuration=(Math.random()*10+10)+"s";
d.style.fontSize=(Math.random()*40+30)+"px";

document.body.appendChild(d);

}

}

</script>

</body>
</html>
